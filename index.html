<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaotic Pendulum</title>

  <!-- Three.js via importmap (ES modules) -->
  <script type="importmap">
  {
    "imports": {
      "three":           "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/":   "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Sidebar nav ────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <h1>Pendulum</h1>
      <p>Baker &amp; Gollub<br>Chaotic Dynamics</p>
    </div>

    <nav>
      <div class="nav-section">Simulation</div>

      <div class="nav-item active" data-view="pendulum">
        <span class="nav-icon">◎</span>
        <span class="nav-label">Pendulum</span>
      </div>

      <div class="nav-item" data-view="generator">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Generator</span>
      </div>

      <div class="nav-section">Visualisation</div>

      <div class="nav-item" data-view="phase2d">
        <span class="nav-icon">∿</span>
        <span class="nav-label">Phase 2D</span>
      </div>

      <div class="nav-item" data-view="phase3d">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Phase 3D</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      d²θ/dt² = −(1/q)ω<br>
      − sinθ + g·cos(Ω<sub>D</sub>t)
    </div>
  </aside>

  <!-- ── Main content ───────────────────────────────────────────── -->
  <main id="main">
    <div id="view-pendulum"  class="view"></div>
    <div id="view-generator" class="view"></div>
    <div id="view-phase2d"   class="view"></div>
    <div id="view-phase3d"   class="view"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
